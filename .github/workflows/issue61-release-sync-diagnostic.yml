name: Diagnose v0.1.8 release synchronization

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Capture guarded patch output
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/issue61-release-sync-diagnostic
          sed -i 's/portable.count(CURRENT) != 4/portable.count(CURRENT) != 3/' tools/issue61_release_sync.py
          python tools/issue61_release_sync.py > artifacts/issue61-release-sync-diagnostic/output.txt 2>&1
          echo "$?" > artifacts/issue61-release-sync-diagnostic/exit-code.txt
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue61-v0.1.8-release-sync-diagnostic
          path: artifacts/issue61-release-sync-diagnostic
          if-no-files-found: error
          retention-days: 2
