name: Apply issue 59 lint fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: issue59-lint-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Detect pending lint script
        id: pending
        shell: bash
        run: |
          if [[ -f tools/issue59_lint_fix.py ]]; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        if: steps.pending.outputs.apply == 'true'
        with:
          python-version: 3.11.9
      - name: Apply assertion-driven lint fixes
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python tools/issue59_lint_fix.py "$GITHUB_WORKSPACE"
          git diff --check
      - name: Publish signed lint-fix commits
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          script_sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/tools/issue59_lint_fix.py?ref=${BRANCH}" --jq .sha)
          jq -n \
            --arg message 'Remove temporary issue 59 lint script' \
            --arg sha "$script_sha" \
            --arg branch "$BRANCH" \
            '{message:$message,sha:$sha,branch:$branch}' \
            | gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/tools/issue59_lint_fix.py" --input - >/dev/null

          publish_file() {
            local path="$1"
            local message="$2"
            local content sha
            content=$(base64 -w0 "$path")
            sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${BRANCH}" --jq .sha)
            jq -n \
              --arg message "$message" \
              --arg content "$content" \
              --arg sha "$sha" \
              --arg branch "$BRANCH" \
              '{message:$message,content:$content,sha:$sha,branch:$branch}' \
              | gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input - >/dev/null
          }

          publish_file game/src/session/player_interaction_flow.gd 'Refactor interaction submission for lint compliance'
          publish_file game/src/session/vertical_slice_coordinator.gd 'Keep interaction coordination within lint bounds'
          publish_file game/src/main/main.gd 'Use private interaction coordinator boundary'
          publish_file game/tests/player_owned_interaction_test.gd 'Format interaction regression assertions'
