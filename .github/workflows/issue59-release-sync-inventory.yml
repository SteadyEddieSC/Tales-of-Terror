name: Inventory v0.1.7 release sync

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inventory:
    if: ${{ github.head_ref == 'agent/issue-59-player-owned-interaction-pass' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Inventory current release references
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/issue59-release-sync
          git grep -n -I -F 'v0.1.6' -- . \
            ':!docs/releases/v0.1.6-controller-first-tale-library-selection-ux.md' \
            ':!docs/playtests/v0.1.6-tale-library-evidence.md' \
            > artifacts/issue59-release-sync/v0.1.6-references.txt || true
          git grep -n -I -E 'RELEASE|release|config/version|bundle' -- \
            game/project.godot \
            game/src/build \
            packaging/portable \
            tools \
            .github/workflows/portable-builds.yml \
            game/tests \
            > artifacts/issue59-release-sync/release-policy-context.txt || true
          git status --short > artifacts/issue59-release-sync/git-status.txt
      - name: Upload inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue59-release-sync-inventory
          path: artifacts/issue59-release-sync
          if-no-files-found: error
          retention-days: 2
