name: Capture issue 59 guidance output

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  guidance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Print rendered guidance in the test fixture
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('game/tests/playtest_main_route_test.gd')
          text = path.read_text(encoding='utf-8')
          marker = '\tvar reset: Label = sandbox.get("_reset_label")\n'
          insertion = marker + '\tprint("ISSUE59_TITLE=", title.text)\n\tprint("ISSUE59_MESSAGE=", message.text)\n'
          if text.count(marker) != 1:
              raise SystemExit('guidance debug marker drifted')
          path.write_text(text.replace(marker, insertion, 1), encoding='utf-8')
          PY
      - name: Download checksum-pinned Godot 4.7.1 stable
        shell: bash
        run: |
          set -euo pipefail
          base=https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable
          curl -fsSL -o godot.zip "$base/Godot_v4.7.1-stable_linux.x86_64.zip"
          echo '4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9  godot.zip' | sha512sum --check -
          unzip -q godot.zip -d .godot-bin
          chmod +x .godot-bin/Godot_v4.7.1-stable_linux.x86_64
      - name: Typed import
        run: .godot-bin/Godot_v4.7.1-stable_linux.x86_64 --headless --editor --path game --quit
      - name: Run and capture guidance
        shell: bash
        run: |
          set -o pipefail
          .godot-bin/Godot_v4.7.1-stable_linux.x86_64 --headless --path game \
            --script res://tests/playtest_main_route_test.gd \
            2>&1 | tee issue59-guidance.log
      - name: Upload guidance console
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue59-guidance-console
          path: issue59-guidance.log
          if-no-files-found: error
          retention-days: 2
