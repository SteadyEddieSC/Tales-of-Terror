name: Apply v0.1.7 release sync from branch

on:
  push:
    branches:
      - agent/issue-59-player-owned-interaction-pass

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.11.9
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Generate synchronized release tree
        shell: bash
        run: |
          set -euo pipefail
          python tools/issue59_release_sync.py
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements-dev.txt
          python tools/portable_bundle.py validate-repository
          python tools/test_portable_bundle.py
          python tools/validate_playtest_readiness.py
          python tools/validate_toolchain.py
          gdlint game/tests/portable_build_identity_test.gd
          gdformat --check game/tests/portable_build_identity_test.gd
          git diff --check
      - name: Download checksum-pinned Godot 4.7.1 stable
        shell: bash
        run: |
          set -euo pipefail
          base=https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable
          curl -fsSL -o godot.zip "$base/Godot_v4.7.1-stable_linux.x86_64.zip"
          echo '4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9  godot.zip' | sha512sum --check -
          unzip -q godot.zip -d .godot-bin
          chmod +x .godot-bin/Godot_v4.7.1-stable_linux.x86_64
      - name: Validate synchronized runtime identity and route
        shell: bash
        run: |
          set -euo pipefail
          GODOT=.godot-bin/Godot_v4.7.1-stable_linux.x86_64
          "$GODOT" --headless --editor --path game --quit
          "$GODOT" --headless --path game --script res://tests/portable_build_identity_test.gd
          "$GODOT" --headless --path game --script res://tests/player_owned_interaction_test.gd
          "$GODOT" --headless --path game --script res://tests/playtest_readiness_test.gd
          "$GODOT" --headless --path game --script res://tests/playtest_main_route_test.gd
      - name: Upload generated permanent workflows
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue59-generated-release-workflows
          path: |
            .github/workflows/portable-builds.yml
            .github/workflows/repository-checks.yml
          if-no-files-found: error
          retention-days: 2
      - name: Publish signed non-workflow release files
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: agent/issue-59-player-owned-interaction-pass
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          branch = os.environ['TARGET_BRANCH']
          token = os.environ['GH_TOKEN']
          files = [
              'CHANGELOG.md',
              'README.md',
              'docs/gdd/Terror_Turn_GDD.md',
              'docs/playtests/v0.1.7-player-owned-interaction-evidence.md',
              'docs/releases/v0.1.7-player-owned-interaction-pass.md',
              'docs/technical/Portable_Playtest_Bundles.md',
              'docs/technical/Toolchain_and_Testing.md',
              'game/project.godot',
              'game/src/build/internal_build_identity.gd',
              'game/tests/fixtures/playtest_report_v2.json',
              'game/tests/fixtures/playtest_report_v2.md',
              'game/tests/portable_build_identity_test.gd',
              'packaging/portable/START_HERE.md',
              'packaging/portable/bundle_spec.json',
              'tools/portable_bundle.py',
              'tools/test_portable_bundle.py',
              'tools/validate_playtest_readiness.py',
          ]

          def request(method, path, payload=None):
              url = f'https://api.github.com/repos/{repo}/{path}'
              data = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Accept', 'application/vnd.github+json')
              req.add_header('X-GitHub-Api-Version', '2022-11-28')
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.load(response)
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return None
                  raise RuntimeError(error.read().decode()) from error

          for relative in files:
              encoded = urllib.parse.quote(relative, safe='/')
              existing = request('GET', f'contents/{encoded}?ref={branch}')
              payload = {
                  'message': f'Synchronize v0.1.7 release: {relative}',
                  'content': base64.b64encode(Path(relative).read_bytes()).decode(),
                  'branch': branch,
              }
              if existing is not None:
                  payload['sha'] = existing['sha']
              request('PUT', f'contents/{encoded}', payload)
          PY
