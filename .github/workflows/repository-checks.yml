name: Repository checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  foundation:
    name: Foundation validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify required files
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f game/project.godot
          test -f docs/gdd/Terror_Turn_GDD.md
          test -f docs/technical/Project_Launch_Guide.md
          test -f docs/decisions/ADR-0008-working-title.md
          test -f docs/decisions/ADR-0020-toolchain-and-test-strategy.md
          test -f docs/art/Visual_Language_Guide.md
          test -f docs/technical/Asset_Pipeline.md
          test -f docs/technical/Toolchain_and_Testing.md
          test -f docs/technical/Playtest_Readiness.md
          test -f docs/technical/Playtest_Report_Privacy.md
          test -f docs/playtests/v0.1.1-facilitator-guide.md
          test -f docs/playtests/Playtest_Readiness_Evidence.md
          test -f docs/playtests/v0.1.2-manual-hardware-validation.json
          test -f docs/playtests/Portable_Playtest_Bundle_Evidence.md
          test -f docs/technical/Portable_Playtest_Bundles.md
          test -f docs/releases/v0.1.2-portable-playtest-build-session-bundle.md
          test -f docs/playtests/v0.1.3-pilot-guide.md
          test -f docs/playtests/v0.1.3-observation-sheet.md
          test -f docs/playtests/v0.1.3-post-session-questionnaire.md
          test -f docs/playtests/v0.1.3-pilot-session-blank.json
          test -f docs/playtests/v0.1.3-findings-register-blank.json
          test -f docs/playtests/v0.1.3-pilot-ready-evidence.md
          test -f docs/releases/v0.1.3-pilot-framework-candidate-build.md
          test -f docs/releases/v0.1.4-reusable-tale-package-authoring-validator.md
          test -f docs/technical/Tale_Package_Contract.md
          test -f docs/technical/Tale_Authoring_Guide.md
          test -f docs/decisions/ADR-0022-versioned-tale-package.md
          test -f docs/playtests/v0.1.4-tale-package-evidence.md
          test -f docs/releases/v0.1.5-tale-catalog-selection-provider-boundary.md
          test -f docs/technical/Tale_Catalog_Contract.md
          test -f docs/technical/Tale_Runtime_Providers.md
          test -f docs/decisions/ADR-0023-tale-catalog-provider-selection.md
          test -f docs/playtests/v0.1.5-tale-catalog-evidence.md
          test -f docs/releases/v0.1.6-controller-first-tale-library-selection-ux.md
          test -f docs/technical/Tale_Library_UX.md
          test -f docs/playtests/v0.1.6-tale-library-evidence.md
          test -f docs/releases/v0.1.7-player-owned-interaction-pass.md
          test -f docs/playtests/v0.1.7-player-owned-interaction-evidence.md
          test -f docs/releases/v0.1.8-controlled-reveal-shared-screen-privacy.md
          test -f docs/playtests/v0.1.8-controlled-reveal-evidence.md
          test -f docs/releases/v0.1.9-automated-playthrough-deadlock-lab.md
          test -f docs/playtests/v0.1.9-automated-playthrough-evidence.md
          test -f game/data/tales/lantern_house/tale_package_v1.json
          test -f game/data/tales/lantern_house/localization_en.json
          test -f game/data/tales/tale_catalog_v1.json
          test -f packaging/pilot/pilot_session_schema.json
          test -f packaging/pilot/findings_register_schema.json
          test -f game/export_presets.cfg
          test -f packaging/portable/bundle_spec.json
          test -f docs/releases/v0.1.1-playtest-readiness-guided-session-ux.md
          test -f game/addons/gut/LICENSE.md
          test -f requirements-dev.in
          test -f requirements-dev.txt
      - name: Reject common secret files and oversized files
        shell: bash
        run: |
          if find . -path ./.git -prune -o \( -name '.env' -o -name '*.keystore' -o -name '*.jks' -o -name '*.pem' -o -name '*.key' \) -print | grep -q .; then
            echo 'Forbidden secret/signing file detected.'
            exit 1
          fi
          large=$(find . -path ./.git -prune -o -type f -size +95M -print)
          if [ -n "$large" ]; then
            echo "Files exceed 95 MB; move them to Git LFS or release storage:"
            echo "$large"
            exit 1
          fi
      - name: Validate JSON files
        run: |
          python - <<'PY2'
          import json, pathlib, sys
          failures=[]
          for p in pathlib.Path('.').rglob('*.json'):
              if '.git' in p.parts:
                  continue
              try:
                  json.loads(p.read_text(encoding='utf-8'))
              except Exception as e:
                  failures.append(f'{p}: {e}')
          if failures:
              print('\n'.join(failures))
              sys.exit(1)
          PY2
      - name: Reject obsolete working-title references in canonical text
        run: |
          if grep -RIn --exclude='*.docx' --exclude='*.png' --exclude-dir='.git' 'Terror[[:space:]]+Tome' README.md docs game services web .github; then
            echo 'Obsolete working-title reference found in canonical text.'
            exit 1
          fi
      - name: Validate asset policy and provenance
        run: python tools/validate_assets.py
      - name: Validate companion privacy and repository policy
        run: python tools/validate_companion.py
      - name: Validate guided session report privacy and export policy
        run: python tools/validate_playtest_readiness.py
      - name: Validate pinned toolchain and test policy
        run: python tools/validate_toolchain.py
      - name: Validate portable export and session-bundle policy
        run: |
          python tools/tale_package.py validate
          python tools/test_tale_package.py
          python tools/tale_catalog.py validate
          python tools/test_tale_catalog.py
          python tools/portable_bundle.py validate-repository
          python tools/test_portable_bundle.py
          python tools/pilot_evidence.py validate-templates
          python tools/test_pilot_evidence.py
      - name: Reject whitespace errors in committed range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          zero_sha=0000000000000000000000000000000000000000
          diff_args=()

          require_commit() {
            local name=$1
            local sha=$2
            if [[ ! "$sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "Missing or invalid $name: '$sha'"
              exit 1
            fi
            if ! git cat-file -e "${sha}^{commit}"; then
              echo "Unavailable $name commit: $sha"
              exit 1
            fi
          }

          case "$EVENT_NAME" in
            pull_request)
              require_commit pull_request.base.sha "$PR_BASE_SHA"
              require_commit pull_request.head.sha "$PR_HEAD_SHA"
              diff_args=("${PR_BASE_SHA}...${PR_HEAD_SHA}")
              ;;
            push)
              require_commit github.sha "$PUSH_HEAD_SHA"
              if [[ -z "$PUSH_BEFORE_SHA" || "$PUSH_BEFORE_SHA" == "$zero_sha" ]]; then
                if git cat-file -e "${PUSH_HEAD_SHA}^1^{commit}" 2>/dev/null; then
                  diff_args=("${PUSH_HEAD_SHA}^1" "$PUSH_HEAD_SHA")
                else
                  empty_tree=$(git hash-object -t tree /dev/null)
                  diff_args=("$empty_tree" "$PUSH_HEAD_SHA")
                fi
              else
                require_commit github.event.before "$PUSH_BEFORE_SHA"
                diff_args=("$PUSH_BEFORE_SHA" "$PUSH_HEAD_SHA")
              fi
              ;;
            *)
              echo "Unsupported event for committed-range whitespace validation: '$EVENT_NAME'"
              exit 1
              ;;
          esac

          git diff --check "${diff_args[@]}" -- . ':(exclude)game/addons/gut/**'
