name: Run issue 63 lab correction

on:
  push:
    branches:
      - agent/issue-63-automated-playthrough-deadlock-lab

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.11.9
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Apply embedded correction and quality gates
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/issue63-lab-style-and-runtime-fix.yml")
          lines = workflow.read_text(encoding="utf-8").splitlines()
          start = lines.index("          python - <<'PY'") + 1
          end = lines.index("          PY", start)
          source = "\n".join(line[10:] for line in lines[start:end]) + "\n"
          namespace = {"__name__": "__main__"}
          exec(compile(source, str(workflow), "exec"), namespace)
          PY
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements-dev.txt
          gdformat game/tests/automated_playthrough_lab_test.gd
          gdlint game/tests/automated_playthrough_lab_test.gd
          git diff --check
      - name: Download checksum-pinned Godot 4.7.1 stable
        shell: bash
        run: |
          set -euo pipefail
          base=https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable
          curl -fsSL -o godot.zip "$base/Godot_v4.7.1-stable_linux.x86_64.zip"
          echo '4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9  godot.zip' | sha512sum --check -
          unzip -q godot.zip -d .godot-bin
          chmod +x .godot-bin/Godot_v4.7.1-stable_linux.x86_64
      - name: Validate typed import and automated lab
        shell: bash
        run: |
          set -euo pipefail
          GODOT=.godot-bin/Godot_v4.7.1-stable_linux.x86_64
          "$GODOT" --headless --editor --path game --quit
          "$GODOT" --headless --path game --script res://tests/automated_playthrough_lab_test.gd
      - name: Publish validated corrected lab
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: agent/issue-63-automated-playthrough-deadlock-lab
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["TARGET_BRANCH"]
          token = os.environ["GH_TOKEN"]
          relative = "game/tests/automated_playthrough_lab_test.gd"
          encoded = urllib.parse.quote(relative, safe="/")
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/{encoded}?ref={branch}",
              headers=headers,
          )
          with urllib.request.urlopen(request) as response:
              existing = json.load(response)
          payload = json.dumps(
              {
                  "message": "Refactor automated playthrough lab for enforced quality gates",
                  "content": base64.b64encode(Path(relative).read_bytes()).decode(),
                  "sha": existing["sha"],
                  "branch": branch,
              }
          ).encode()
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/{encoded}",
              data=payload,
              method="PUT",
              headers=headers,
          )
          with urllib.request.urlopen(request):
              pass
          PY
