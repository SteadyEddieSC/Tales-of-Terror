name: Preproduction dialogue validation

on:
  pull_request:
    paths:
      - '.github/workflows/preproduction-dialogue.yml'
      - 'docs/tales/drowned_harbor/dialogue/**'
      - 'tools/validate_preproduction_dialogue.py'
      - 'tools/test_validate_preproduction_dialogue.py'
  push:
    branches: [main]
    paths:
      - '.github/workflows/preproduction-dialogue.yml'
      - 'docs/tales/drowned_harbor/dialogue/**'
      - 'tools/validate_preproduction_dialogue.py'
      - 'tools/test_validate_preproduction_dialogue.py'

permissions:
  contents: read

jobs:
  validate:
    name: Governed dialogue contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate all governed dialogue catalogs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t catalogs < <(
            find docs/tales/drowned_harbor/dialogue \
              -maxdepth 1 \
              -type f \
              -name 'drowned_harbor_dialogue*.json' \
              -print | sort
          )
          if (( ${#catalogs[@]} == 0 )); then
            echo 'No governed dialogue catalogs found.'
            exit 1
          fi
          python tools/validate_preproduction_dialogue.py "${catalogs[@]}"
      - name: Run dialogue validator regression tests
        run: python tools/test_validate_preproduction_dialogue.py
