name: Issue 44 dependency lock probe

on:
  push:
    branches:
      - agent/issue-44-companion-security-remediation

permissions:
  contents: read

jobs:
  regenerate-and-validate:
    name: Regenerate lock and validate security path
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      WRANGLER_SEND_METRICS: "false"
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.1

      - name: Set up Node 24.18.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: 24.18.0
          cache: npm

      - name: Regenerate lock for supported Wrangler update only
        run: npm install --package-lock-only --ignore-scripts --save-exact --save-dev wrangler@4.113.0

      - name: Install regenerated locked dependencies
        run: npm ci

      - name: Record exact dependency path
        shell: bash
        run: |
          set -euo pipefail
          node --version | tee issue-44-node-version.txt
          npm --version | tee issue-44-npm-version.txt
          npm ls wrangler miniflare sharp --all | tee issue-44-dependency-tree.txt
          node - <<'NODE' | tee issue-44-lock-summary.json
          import fs from "node:fs";
          const lock = JSON.parse(fs.readFileSync("package-lock.json", "utf8"));
          const packages = lock.packages ?? {};
          const rows = Object.entries(packages)
            .filter(([path]) => /(^|node_modules\/)(wrangler|miniflare|sharp)$/.test(path))
            .map(([path, value]) => ({ path, version: value.version ?? null }))
            .sort((a, b) => a.path.localeCompare(b.path));
          console.log(JSON.stringify({ lockfileVersion: lock.lockfileVersion, packages: rows }, null, 2));
          NODE

      - name: Require zero high or critical audit findings
        shell: bash
        run: |
          set -o pipefail
          npm audit --audit-level=high --json | tee issue-44-audit.json

      - name: Strict TypeScript validation
        run: npm run typecheck

      - name: Companion service and browser tests
        run: npm test

      - name: Worker and browser production builds
        run: npm run build

      - name: Upload regenerated lock and evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: issue-44-lock-probe-${{ github.sha }}
          path: |
            package.json
            package-lock.json
            issue-44-node-version.txt
            issue-44-npm-version.txt
            issue-44-dependency-tree.txt
            issue-44-lock-summary.json
            issue-44-audit.json
          if-no-files-found: error
          retention-days: 7
