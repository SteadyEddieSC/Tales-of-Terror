name: Apply issue 63 lab style and runtime fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.11.9
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Refactor bounded lab functions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("game/tests/automated_playthrough_lab_test.gd")
          text = path.read_text(encoding="utf-8")

          def replace_between(start: str, end: str, replacement: str) -> None:
              global text
              start_index = text.index(start)
              end_index = text.index(end, start_index)
              text = text[:start_index] + replacement.rstrip() + "\n\n" + text[end_index:]

          replace_between(
              "func _complete_reveals(",
              "func _disconnect_reconnect(",
              r'''func _complete_reveals(coordinator: VerticalSliceCoordinator, strategy: String) -> Dictionary:
	var flow: PrivateRevealFlow = coordinator.get("_private_reveal_flow")
	var steps: int = 0
	var reconnect_injected: bool = false
	var failure: Dictionary = {}
	while flow.is_blocking() and failure.is_empty():
		steps += 1
		if steps > SeatManager.MAX_SEATS * 3:
			failure = _failed("private_reveal_step_bound_exceeded", steps)
			continue
		var seat_number: int = flow.current_seat()
		var result: Dictionary = _complete_one_reveal(
			coordinator, flow, seat_number, strategy, reconnect_injected, steps
		)
		if not result.accepted:
			failure = result
		elif result.get("reconnect_injected", false):
			reconnect_injected = true
	if failure.is_empty() and flow.phase != PrivateRevealFlow.PHASE_COMPLETE:
		failure = _failed("private_reveal_queue_incomplete", steps)
	return failure if not failure.is_empty() else {"accepted": true, "steps": steps}


func _complete_one_reveal(
	coordinator: VerticalSliceCoordinator,
	flow: PrivateRevealFlow,
	seat_number: int,
	strategy: String,
	reconnect_injected: bool,
	step: int,
) -> Dictionary:
	var failure: Dictionary = {}
	var injected: bool = false
	if seat_number <= 0:
		failure = _failed("private_reveal_missing_authorized_seat", step)
	if failure.is_empty():
		var privacy: Dictionary = _assert_public_privacy(coordinator, step)
		if not privacy.accepted:
			failure = privacy
	if failure.is_empty():
		var idle: Dictionary = _idle_probe(coordinator)
		if not idle.accepted:
			failure = _failed(idle.reason, step)
	if failure.is_empty():
		var wrong_seat: int = _first_other_seat(coordinator.active_seats(), seat_number)
		if wrong_seat > 0:
			var wrong_before: Dictionary = coordinator.to_snapshot()
			var wrong: Dictionary = PrivateRevealFlow.submit_for(
				coordinator, wrong_seat, "confirm"
			)
			if wrong.accepted or coordinator.to_snapshot() != wrong_before:
				failure = _failed("private_reveal_wrong_seat_mutated", step)
	if failure.is_empty():
		var opened: Dictionary = PrivateRevealFlow.submit_for(
			coordinator, seat_number, "confirm"
		)
		if not opened.accepted or flow.phase != PrivateRevealFlow.PHASE_REVEAL:
			failure = _failed("private_reveal_open_failed", step)
	if failure.is_empty() and strategy == "delayed_reconnect" and not reconnect_injected:
		var reconnect: Dictionary = _disconnect_reconnect(coordinator, flow, seat_number)
		if not reconnect.accepted:
			failure = _failed(reconnect.reason, step)
		else:
			injected = true
			var reopened: Dictionary = PrivateRevealFlow.submit_for(
				coordinator, seat_number, "confirm"
			)
			if not reopened.accepted or flow.phase != PrivateRevealFlow.PHASE_REVEAL:
				failure = _failed("private_reveal_reopen_failed", step)
	if failure.is_empty():
		var private_view: Dictionary = PrivateRevealFlow.private_view_for(
			coordinator, seat_number
		)
		if not private_view.get("accepted", false):
			failure = _failed("authorized_private_projection_rejected", step)
	if failure.is_empty():
		var acknowledged: Dictionary = PrivateRevealFlow.submit_for(
			coordinator, seat_number, "confirm"
		)
		if not acknowledged.accepted:
			failure = _failed("private_reveal_acknowledgement_failed", step)
	if failure.is_empty():
		var duplicate_before: Dictionary = coordinator.to_snapshot()
		var duplicate: Dictionary = PrivateRevealFlow.submit_for(
			coordinator, seat_number, "confirm"
		)
		if duplicate.accepted or coordinator.to_snapshot() != duplicate_before:
			failure = _failed("private_reveal_duplicate_mutated", step)
	if not failure.is_empty():
		return failure
	return {"accepted": true, "reconnect_injected": injected}''',
          )

          replace_between(
              "func _disconnect_reconnect(",
              "func _drive_active_tale(",
              r'''func _disconnect_reconnect(
	coordinator: VerticalSliceCoordinator, flow: PrivateRevealFlow, seat_number: int
) -> Dictionary:
	var failure: String = ""
	var device_id: int = seat_number - 1
	var seat_index: int = coordinator.seat_manager.disconnect_device(device_id)
	if seat_index != seat_number - 1:
		failure = "disconnect_lost_stable_seat"
	if failure.is_empty():
		var disconnected: Dictionary = coordinator.role_session.set_seat_connected(
			seat_number, false
		)
		if not disconnected.accepted:
			failure = "role_disconnect_rejected"
	if failure.is_empty():
		PrivateRevealFlow.connection_changed_for(coordinator, seat_number, false)
		if flow.phase != PrivateRevealFlow.PHASE_SHIELD or flow.current_seat() != seat_number:
			failure = "disconnect_did_not_fail_closed"
	if failure.is_empty():
		var disconnected_before: Dictionary = coordinator.to_snapshot()
		var blocked: Dictionary = PrivateRevealFlow.submit_for(coordinator, seat_number, "confirm")
		if blocked.accepted or coordinator.to_snapshot() != disconnected_before:
			failure = "disconnected_reveal_input_mutated"
	if failure.is_empty():
		var restored_index: int = coordinator.seat_manager.reconnect_device(
			device_id, _identity(seat_number), "Virtual Lab Seat"
		)
		if restored_index != seat_number - 1:
			failure = "reconnect_transferred_stable_seat"
	if failure.is_empty():
		var reconnected: Dictionary = coordinator.role_session.set_seat_connected(
			seat_number, true
		)
		if not reconnected.accepted:
			failure = "role_reconnect_rejected"
	if failure.is_empty():
		PrivateRevealFlow.connection_changed_for(coordinator, seat_number, true)
		if flow.current_seat() != seat_number or flow.phase != PrivateRevealFlow.PHASE_SHIELD:
			failure = "reconnect_authorization_changed"
	return {"accepted": failure.is_empty(), "reason": failure}''',
          )

          replace_between(
              "func _drive_active_tale(",
              "func _resolve_interaction(",
              r'''func _drive_active_tale(
	coordinator: VerticalSliceCoordinator, strategy: String, initial_steps: int
) -> Dictionary:
	var steps: int = initial_steps
	var failure: Dictionary = {}
	while coordinator.lifecycle == "active_tale" and failure.is_empty():
		steps += 1
		if steps > MAX_STEPS:
			failure = _failed("active_tale_step_bound_exceeded", steps)
			continue
		var privacy: Dictionary = _assert_public_privacy(coordinator, steps)
		if not privacy.accepted:
			failure = privacy
			continue
		var state: Dictionary = coordinator.public_state().get("interaction", {})
		if state.is_empty():
			failure = _failed("active_tale_interaction_missing", steps)
			continue
		var eligible: Array[int] = _int_array(state.get("eligible_seats", []))
		if eligible.is_empty():
			failure = _failed("required_interaction_has_no_eligible_seat", steps)
			continue
		var idle: Dictionary = _idle_probe(coordinator)
		if not idle.accepted:
			failure = _failed(idle.reason, steps)
			continue
		var before: String = _progress_token(coordinator)
		var result: Dictionary = _resolve_interaction(coordinator, state, strategy, steps)
		if not result.get("accepted", false):
			failure = _failed(result.get("reason", "interaction_rejected"), steps)
		elif coordinator.lifecycle == "active_tale" and _progress_token(coordinator) == before:
			failure = _failed("accepted_interaction_made_no_progress", steps)
	if failure.is_empty() and coordinator.lifecycle != "terminal":
		failure = _failed("invalid_lifecycle_after_active_tale", steps)
	return failure if not failure.is_empty() else {"accepted": true, "steps": steps}''',
          )

          replace_between(
              "func _idle_probe(",
              "func _assert_public_privacy(",
              r'''func _idle_probe(coordinator: VerticalSliceCoordinator) -> Dictionary:
	var authority: String = coordinator.authority_digest()
	var history: String = coordinator.public_history_digest()
	var public_projection: String = JSON.stringify(
		TalePackage.canonicalize(coordinator.public_state())
	)
	for _index: int in IDLE_READS:
		if (
			coordinator.authority_digest() != authority
			or coordinator.public_history_digest() != history
			or JSON.stringify(TalePackage.canonicalize(coordinator.public_state()))
			!= public_projection
		):
			return {"accepted": false, "reason": "idle_read_mutated_state"}
	return {"accepted": true, "reason": ""}''',
          )

          replace_between(
              "func _test_mid_prompt_restore(",
              "func _test_failure_record_contract(",
              r'''func _test_mid_prompt_restore(seat_count: int) -> void:
	var setup: Dictionary = _new_session(seat_count, 4706)
	var coordinator: VerticalSliceCoordinator = setup.get("coordinator")
	var failure: Dictionary = {} if setup.accepted else setup
	if failure.is_empty():
		var reveal: Dictionary = _complete_reveals(coordinator, "cooperative")
		if not reveal.accepted:
			failure = reveal
	if failure.is_empty():
		var opening: Dictionary = coordinator.public_state().interaction
		var actor: int = _int_array(opening.eligible_seats)[0]
		if not coordinator._submit_player_interaction(actor, "confirm").accepted:
			failure = _failed("restore_fixture_open_failed", 1)
	if failure.is_empty():
		var prompt: Dictionary = coordinator.rules_session.pending_prompt
		var first_seat: int = _int_array(prompt.eligible_seats)[0]
		var option_id: String = prompt.options[0].id
		var response: Dictionary = coordinator.rules_session.submit_response(
			first_seat, [option_id], prompt.revision
		)
		if not response.accepted:
			failure = _failed("restore_fixture_response_failed", 2)
	var restored := VerticalSliceCoordinator.new()
	if failure.is_empty() and not restored.restore_snapshot(coordinator.to_snapshot()).accepted:
		failure = _failed("snapshot_restore_rejected", 3)
	if failure.is_empty():
		var completed: Dictionary = _drive_active_tale(restored, "cooperative", 3)
		if not completed.accepted:
			failure = completed
	if failure.is_empty():
		var baseline: Dictionary = _run_session(seat_count, 4706, "cooperative")
		if (
			not baseline.accepted
			or restored.authority_digest() != baseline.authority_digest
			or restored.public_history_digest() != baseline.public_history_digest
		):
			failure = _failed("restored_replay_divergence", 4)
	if failure.is_empty():
		_runs += 2
	else:
		_record_failure(restored, seat_count, 4706, "restore", failure)''',
          )

          path.write_text(text, encoding="utf-8")
          PY
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements-dev.txt
          gdformat game/tests/automated_playthrough_lab_test.gd
          gdlint game/tests/automated_playthrough_lab_test.gd
          git diff --check
      - name: Download checksum-pinned Godot 4.7.1 stable
        shell: bash
        run: |
          set -euo pipefail
          base=https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable
          curl -fsSL -o godot.zip "$base/Godot_v4.7.1-stable_linux.x86_64.zip"
          echo '4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9  godot.zip' | sha512sum --check -
          unzip -q godot.zip -d .godot-bin
          chmod +x .godot-bin/Godot_v4.7.1-stable_linux.x86_64
      - name: Validate typed import and automated lab
        shell: bash
        run: |
          set -euo pipefail
          GODOT=.godot-bin/Godot_v4.7.1-stable_linux.x86_64
          "$GODOT" --headless --editor --path game --quit
          "$GODOT" --headless --path game --script res://tests/automated_playthrough_lab_test.gd
      - name: Publish validated corrected lab
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: agent/issue-63-automated-playthrough-deadlock-lab
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["TARGET_BRANCH"]
          token = os.environ["GH_TOKEN"]
          relative = "game/tests/automated_playthrough_lab_test.gd"
          encoded = urllib.parse.quote(relative, safe="/")
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          get_request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/{encoded}?ref={branch}",
              headers=headers,
          )
          with urllib.request.urlopen(get_request) as response:
              existing = json.load(response)
          payload = json.dumps(
              {
                  "message": "Refactor automated playthrough lab for enforced quality gates",
                  "content": base64.b64encode(Path(relative).read_bytes()).decode(),
                  "sha": existing["sha"],
                  "branch": branch,
              }
          ).encode()
          put_request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/{encoded}",
              data=payload,
              method="PUT",
              headers=headers,
          )
          with urllib.request.urlopen(put_request):
              pass
          PY
