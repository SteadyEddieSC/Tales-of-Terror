name: Synchronize v0.1.8 release identity

on:
  push:
    branches:
      - agent/issue-61-controlled-reveal-privacy
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  synchronize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Detect pending release synchronizer
        id: pending
        shell: bash
        run: |
          if [[ -f tools/issue61_release_sync.py ]]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        if: steps.pending.outputs.present == 'true'
        with:
          python-version: 3.11.9
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Prepare and validate bounded v0.1.8 release patch
        if: steps.pending.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python tools/issue61_release_sync.py
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements-dev.txt
          python -m pip check
          python tools/validate_toolchain.py
          python tools/validate_playtest_readiness.py
          python tools/portable_bundle.py validate-repository
          python tools/test_portable_bundle.py
          python -m json.tool packaging/portable/bundle_spec.json >/dev/null
          python -m json.tool game/tests/fixtures/playtest_report_v2.json >/dev/null
          git diff --check
      - name: Download checksum-pinned Godot 4.7.1 stable
        if: steps.pending.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base=https://github.com/godotengine/godot-builds/releases/download/4.7.1-stable
          curl -fsSL -o godot.zip "$base/Godot_v4.7.1-stable_linux.x86_64.zip"
          echo '4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9  godot.zip' | sha512sum --check -
          unzip -q godot.zip -d .godot-bin
          chmod +x .godot-bin/Godot_v4.7.1-stable_linux.x86_64
      - name: Validate release identity, privacy, restoration, and route
        if: steps.pending.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          GODOT=.godot-bin/Godot_v4.7.1-stable_linux.x86_64
          "$GODOT" --headless --editor --path game --quit
          "$GODOT" --headless --path game --script res://tests/portable_build_identity_test.gd
          "$GODOT" --headless --path game --script res://tests/private_reveal_flow_test.gd
          "$GODOT" --headless --path game --script res://tests/playtest_readiness_test.gd
          "$GODOT" --headless --path game --script res://tests/vertical_slice_test.gd
          "$GODOT" --headless --path game --script res://tests/playtest_main_route_test.gd
      - name: Upload generated permanent workflow files
        if: steps.pending.outputs.present == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue61-v0.1.8-workflow-files
          path: |
            .github/workflows/portable-builds.yml
            .github/workflows/repository-checks.yml
          if-no-files-found: error
          retention-days: 2
      - name: Publish signed non-workflow release files
        if: steps.pending.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: agent/issue-61-controlled-reveal-privacy
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["TARGET_BRANCH"]
          token = os.environ["GH_TOKEN"]
          root = Path(os.environ["GITHUB_WORKSPACE"])
          files = [
              line.strip()
              for line in (root / "artifacts/issue61-release-sync-files.txt").read_text().splitlines()
              if line.strip() and not line.startswith(".github/workflows/")
          ]

          def request(method, path, payload=None):
              url = f"https://api.github.com/repos/{repo}/{path}"
              data = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.load(response)
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return None
                  raise RuntimeError(error.read().decode()) from error

          script_path = "tools/issue61_release_sync.py"
          encoded_script = urllib.parse.quote(script_path, safe="/")
          existing_script = request("GET", f"contents/{encoded_script}?ref={branch}")
          if existing_script is not None:
              request(
                  "DELETE",
                  f"contents/{encoded_script}",
                  {
                      "message": "Remove temporary v0.1.8 release synchronizer",
                      "sha": existing_script["sha"],
                      "branch": branch,
                  },
              )

          for relative in files:
              encoded = urllib.parse.quote(relative, safe="/")
              existing = request("GET", f"contents/{encoded}?ref={branch}")
              payload = {
                  "message": f"Synchronize v0.1.8 release: {relative}",
                  "content": base64.b64encode((root / relative).read_bytes()).decode(),
                  "branch": branch,
              }
              if existing is not None:
                  payload["sha"] = existing["sha"]
              request("PUT", f"contents/{encoded}", payload)
          PY
