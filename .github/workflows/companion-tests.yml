name: Companion service and browser tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  companion:
    name: Protocol, room service, and browser validation
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    env:
      WRANGLER_SEND_METRICS: "false"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Dependency vulnerability audit
        run: npm audit --audit-level=moderate
      - name: Strict TypeScript validation
        run: npm run typecheck
      - name: Protocol, service, browser, privacy, and accessibility tests
        run: npm test
      - name: Worker and browser production builds
        run: npm run build
      - name: Local Worker and Durable Object emulation smoke
        shell: bash
        run: |
          set -euo pipefail
          npm run dev:service -- --port 8787 > /tmp/terror-turn-room.log 2>&1 &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8787/v1/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done
          python - <<'PY'
          import json
          value=json.load(open('/tmp/health.json', encoding='utf-8'))
          assert value == {'status': 'ok', 'serviceVersion': '0.0.9'}, value
          PY
          curl -fsS -X POST http://127.0.0.1:8787/v1/rooms > /tmp/room.json
          python - <<'PY'
          import json
          value=json.load(open('/tmp/room.json', encoding='utf-8'))
          assert value['accepted'] is True
          assert len(value['joinCode']) == 6
          assert value['joinCode'] != value['hostCapability']
          PY
