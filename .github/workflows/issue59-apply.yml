name: Apply issue 59 implementation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.11.9
      - name: Apply bounded player-owned interaction patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode tools/issue59_payload.b64 > /tmp/issue59_payload.zip
          rm -rf /tmp/issue59_payload
          python -m zipfile -e /tmp/issue59_payload.zip /tmp/issue59_payload
          python /tmp/issue59_payload/apply_patch.py "$GITHUB_WORKSPACE"
          git diff --check
      - name: Upload exact patched files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue59-patched-files
          path: |
            game/src/session/player_interaction_flow.gd
            game/src/session/player_interaction_flow.gd.uid
            game/src/session/vertical_slice_coordinator.gd
            game/src/main/main.gd
            game/src/exploration/exploration_sandbox.gd
            game/tests/player_owned_interaction_test.gd
            game/tests/player_owned_interaction_test.gd.uid
            .github/workflows/godot-tests.yml
            tools/validate_toolchain.py
          if-no-files-found: error
          retention-days: 2
