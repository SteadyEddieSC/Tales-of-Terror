name: Apply issue 59 implementation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: issue59-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Detect pending payload
        id: pending
        shell: bash
        run: |
          if [[ -f tools/issue59_payload.b64 ]]; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        if: steps.pending.outputs.apply == 'true'
        with:
          python-version: 3.11.9
      - name: Apply bounded player-owned interaction patch
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode tools/issue59_payload.b64 > /tmp/issue59_payload.zip
          rm -rf /tmp/issue59_payload
          python -m zipfile -e /tmp/issue59_payload.zip /tmp/issue59_payload
          python /tmp/issue59_payload/apply_patch.py "$GITHUB_WORKSPACE"
          git diff --check
      - name: Publish signed implementation commits
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          payload_sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/tools/issue59_payload.b64?ref=${BRANCH}" --jq .sha)
          jq -n \
            --arg message 'Remove temporary issue 59 payload' \
            --arg sha "$payload_sha" \
            --arg branch "$BRANCH" \
            '{message:$message,sha:$sha,branch:$branch}' \
            | gh api --method DELETE "repos/${GITHUB_REPOSITORY}/contents/tools/issue59_payload.b64" --input - >/dev/null

          publish_file() {
            local path="$1"
            local message="$2"
            local content sha
            content=$(base64 -w0 "$path")
            if sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${BRANCH}" --jq .sha 2>/dev/null); then
              jq -n \
                --arg message "$message" \
                --arg content "$content" \
                --arg sha "$sha" \
                --arg branch "$BRANCH" \
                '{message:$message,content:$content,sha:$sha,branch:$branch}' \
                | gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input - >/dev/null
            else
              jq -n \
                --arg message "$message" \
                --arg content "$content" \
                --arg branch "$BRANCH" \
                '{message:$message,content:$content,branch:$branch}' \
                | gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input - >/dev/null
            fi
          }

          publish_file game/src/session/player_interaction_flow.gd 'Add player interaction flow'
          publish_file game/src/session/player_interaction_flow.gd.uid 'Register player interaction flow identity'
          publish_file game/src/session/vertical_slice_coordinator.gd 'Route player-owned interaction windows'
          publish_file game/src/main/main.gd 'Route active Tale input by stable seat'
          publish_file game/src/exploration/exploration_sandbox.gd 'Present active player interaction guidance'
          publish_file game/tests/player_owned_interaction_test.gd 'Add player-owned interaction regression coverage'
          publish_file game/tests/player_owned_interaction_test.gd.uid 'Register player-owned interaction test identity'
          publish_file .github/workflows/godot-tests.yml 'Run player-owned interaction tests in CI'
          publish_file tools/validate_toolchain.py 'Register player-owned interaction test policy'
