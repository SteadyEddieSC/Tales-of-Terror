name: Rebase issue 61 onto v0.1.7

on:
  push:
    branches:
      - agent/issue-61-controlled-reveal-rebased

permissions:
  contents: write

jobs:
  publish:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: 8e98e70693183a5471a0dbb212ab9a1f79eeb570
      - name: Upload permanent workflow for signed publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue61-rebased-godot-workflow
          path: .github/workflows/godot-tests.yml
          if-no-files-found: error
          retention-days: 2
      - name: Publish validated non-workflow files onto v0.1.7
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: agent/issue-61-controlled-reveal-rebased
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["TARGET_BRANCH"]
          token = os.environ["GH_TOKEN"]
          files = [
              "game/src/exploration/exploration_sandbox.gd",
              "game/src/main/main.gd",
              "game/src/session/vertical_slice_coordinator.gd",
              "game/src/social/private_reveal_flow.gd",
              "game/src/social/private_reveal_flow.gd.uid",
              "game/src/social/role_hud.gd",
              "game/tests/gut/test_playtest_readiness.gd",
              "game/tests/gut/test_vertical_slice_coordinator.gd",
              "game/tests/playtest_main_route_test.gd",
              "game/tests/playtest_readiness_test.gd",
              "game/tests/private_reveal_flow_test.gd",
              "game/tests/private_reveal_flow_test.gd.uid",
              "game/tests/vertical_slice_test.gd",
              "tools/validate_toolchain.py",
          ]

          def request(method, path, payload=None):
              url = f"https://api.github.com/repos/{repo}/{path}"
              data = None if payload is None else json.dumps(payload).encode()
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              try:
                  with urllib.request.urlopen(req) as response:
                      return json.load(response)
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return None
                  raise RuntimeError(error.read().decode()) from error

          for relative in files:
              encoded = urllib.parse.quote(relative, safe="/")
              existing = request("GET", f"contents/{encoded}?ref={branch}")
              payload = {
                  "message": f"Rebase controlled reveal onto v0.1.7: {relative}",
                  "content": base64.b64encode(Path(relative).read_bytes()).decode(),
                  "branch": branch,
              }
              if existing is not None:
                  payload["sha"] = existing["sha"]
              request("PUT", f"contents/{encoded}", payload)
          PY
