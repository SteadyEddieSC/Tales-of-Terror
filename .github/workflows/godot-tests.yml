name: Godot 4.7 tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  headless:
    name: Godot 4.7 headless validation
    runs-on: ubuntu-24.04
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.11.9
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Apply staged issue 63 lab correction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/issue63-lab-style-and-runtime-fix.yml")
          lines = workflow.read_text(encoding="utf-8").splitlines()
          start = lines.index("          python - <<'PY'") + 1
          end = lines.index("          PY", start)
          source = "\n".join(line[10:] for line in lines[start:end]) + "\n"
          exec(compile(source, str(workflow), "exec"), {"__name__": "__main__"})
          PY
      - name: Install pinned formatter
        run: python -m pip install --disable-pip-version-check --require-hashes --requirement requirements-dev.txt
      - name: Capture formatter diagnostic
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/issue63-format
          gdformat game/tests/automated_playthrough_lab_test.gd > artifacts/issue63-format/gdformat.txt 2>&1
          status=$?
          cat artifacts/issue63-format/gdformat.txt
          printf '\nexit_code=%s\n' "$status" >> artifacts/issue63-format/gdformat.txt
          exit "$status"
      - name: Upload formatter diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: issue63-gdformat-diagnostic
          path: artifacts/issue63-format/gdformat.txt
          if-no-files-found: error
          retention-days: 2
