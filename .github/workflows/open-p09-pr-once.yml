name: Open P0.9 draft PR once

on:
  push:
    branches: [docs/p0.9-tale-authoring-schema]
    paths:
      - '.github/workflows/open-p09-pr-once.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  open:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Open the draft pull request if absent
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          existing="$(gh pr list --state open --head docs/p0.9-tale-authoring-schema --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            url="$(gh pr create \
              --draft \
              --base main \
              --head docs/p0.9-tale-authoring-schema \
              --title 'P0.9 — Tale Authoring Schema & Design-Only Drowned Harbor Reference Package' \
              --body-file docs/preproduction/P0.9_Release_Summary.md)"
            number="${url##*/}"
          else
            number="$existing"
          fi
          if gh issue view 73 >/dev/null 2>&1; then
            gh issue close 73 --comment "Superseded by draft PR #${number}."
          fi
